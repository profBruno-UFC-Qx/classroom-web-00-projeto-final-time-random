<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/frontend/dashboard.css">
</head>
<body>

    <!-- Icones-->
<i class="bi bi-window-sidebar"></i>
<img id="logo" src="/src/imagens/logocolorida-removebg-preview.png" alt="Logo do site">

<!-- Barra de progresso do xp com nível e botão de ganhar-->
<div class="mb-2 d-flex justify-content-center align-items-center flex-column">
  <span id="nivel-texto" style="color: white;font-weight: bold;">Nível 0</span>
  <span id="xp-texto" class="xp-texto" style="color: white;">0 / 500 XP</span>
</div>

<div class="progress" style="height: 25px; width: 70%; margin-left: 15%;">
  <div id="barra-xp" class="progress-bar progress-bar-striped"
    style="width: 0%; background: linear-gradient(to right, #3b0764, #6a0dad);">
  </div>
</div>

<div class="mt-3">
  <button class="btn btn-sm btn-outline-light" onclick="ganharXP()">+ Ganhar XP</button>
</div>

    
</body>
</html>
